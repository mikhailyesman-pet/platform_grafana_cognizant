AWSTemplateFormatVersion: "2010-09-09"
Description: "AWS Managed Grafana with Plugins and SSO Integration"

Parameters:
  EnvironmentName:
    Type: String
    Default: dev
    AllowedValues:
      - dev
    Description: Environment name

  GrafanaAdminPassword:
    Type: String
    NoEcho: true
    Description: Grafana admin password (will be stored in Secrets Manager)
    MinLength: 12
    AllowedPattern: ^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{12,}$

  GrafanaServiceRoleArn:
    Type: String
    Description: IAM role ARN used by AWS Managed Grafana to read CloudWatch data

  LambdaPluginInstallationRoleArn:
    Type: String
    Description: IAM role ARN for Lambda plugin installation

Resources:
  # ============================================
  # Grafana Admin Password Secret
  # ============================================
  GrafanaAdminPasswordSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "/grafana/${EnvironmentName}/admin-password"
      SecretString: !Sub |
        {
          "username": "admin",
          "password": "${GrafanaAdminPassword}",
          "environment": "${EnvironmentName}"
        }
      Description: Grafana admin credentials

  # ============================================
  # Grafana API Key Secret (will be populated by Lambda)
  # ============================================
  GrafanaAPIKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "/grafana/${EnvironmentName}/api-key"
      SecretString: '{"api_key": "placeholder"}'
      Description: Grafana API Key for automation

  # ============================================
  # AWS Managed Grafana Workspace
  # ============================================
  GrafanaWorkspace:
    Type: AWS::Grafana::Workspace
    Properties:
      AccountAccessType: CURRENT_ACCOUNT
      AuthenticationProviders:
        - AWS_SSO
      PermissionType: CUSTOMER_MANAGED
      RoleArn: !Ref GrafanaServiceRoleArn
      Name: !Sub "managed-grafana-${EnvironmentName}"
      Description: !Sub "AWS Managed Grafana observability workspace for ${EnvironmentName}"
      PluginAdminEnabled: true
      NotificationDestinations:
        - SNS
      DataSources:
        - CLOUDWATCH

  PluginInstallationLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "grafana-${EnvironmentName}-install-plugins"
      Runtime: python3.12
      Handler: index.handler
      Role: !Ref LambdaPluginInstallationRoleArn
      Timeout: 300
      Code:
        ZipFile: |
          import json
          import boto3
          import urllib3
          import cfnresponse
          
          grafana_client = boto3.client('grafana')
          secrets_client = boto3.client('secretsmanager')
          
          PLUGINS_TO_INSTALL = [
              'grafana-piechart-panel',
              'grafana-clock-panel'
          ]

          def workspace_url(workspace):
              endpoint = workspace['workspace']['endpoint']
              if endpoint.startswith('http'):
                  return endpoint
              return f"https://{endpoint}"

          def send(event, context, status, data, physical_id):
              cfnresponse.send(event, context, status, data, physical_id)
          
          def handler(event, context):
              physical_id = event.get('PhysicalResourceId', 'grafana-plugin-installation')
              try:
                  print(f"Event: {json.dumps(event)}")
                  props = event.get('ResourceProperties', {})
                  workspace_id = props.get('WorkspaceId')
                  
                  if event.get('RequestType') == 'Delete':
                      send(event, context, cfnresponse.SUCCESS, {'Message': 'Delete skipped'}, physical_id)
                      return

                  if not workspace_id:
                      raise ValueError("WorkspaceId is required")
                  
                  workspace_info = grafana_client.describe_workspace(
                      workspaceId=workspace_id
                  )

                  api_key = grafana_client.create_workspace_api_key(
                      workspaceId=workspace_id,
                      keyName='cloudformation-plugin-admin',
                      keyRole='ADMIN',
                      secondsToLive=2592000
                  )['key']

                  secrets_client.update_secret(
                      SecretId=props['ApiKeySecretArn'],
                      SecretString=json.dumps({'api_key': api_key})
                  )
                  
                  url = workspace_url(workspace_info)
                  http = urllib3.PoolManager()
                  headers = {
                      'Authorization': f'Bearer {api_key}',
                      'Accept': 'application/json',
                      'Content-Type': 'application/json'
                  }
                  
                  results = []
                  for plugin_id in PLUGINS_TO_INSTALL:
                      try:
                          print(f"Installing plugin: {plugin_id}")
                          response = http.request(
                              'POST',
                              f'{url}/api/plugins/{plugin_id}/install',
                              body=json.dumps({}),
                              headers=headers
                          )
                          if response.status not in [200, 201, 409]:
                              raise RuntimeError(response.data.decode('utf-8'))
                          results.append({
                              'plugin': plugin_id,
                              'status': 'installed',
                              'http_status': response.status
                          })
                      except Exception as e:
                          results.append({
                              'plugin': plugin_id,
                              'status': 'failed',
                              'error': str(e)
                          })
                  
                  print(f"Installation results: {json.dumps(results)}")
                  
                  cfnresponse.send(
                      event, 
                      context, 
                      cfnresponse.SUCCESS,
                      {
                          'WorkspaceId': workspace_id,
                          'PluginsInstalled': len([r for r in results if r['status'] == 'installed']),
                          'Results': results
                      },
                      f"grafana-plugins-{workspace_id}"
                  )
                  
              except Exception as e:
                  print(f"Error: {str(e)}")
                  cfnresponse.send(
                      event, 
                      context, 
                      cfnresponse.FAILED,
                      {'Error': str(e)},
                      physical_id
                  )

  # ============================================
  # Custom Resource - Plugin Installation
  # ============================================
  PluginInstallationCustomResource:
    Type: Custom::PluginInstallation
    Properties:
      ServiceToken: !GetAtt PluginInstallationLambda.Arn
      WorkspaceId: !Ref GrafanaWorkspace
      ApiKeySecretArn: !Ref GrafanaAPIKeySecret

  # ============================================
  # Store Workspace Info in Parameter Store
  # ============================================
  GrafanaWorkspaceIdParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/grafana/workspace-id/${EnvironmentName}"
      Type: String
      Value: !Ref GrafanaWorkspace
      Description: Grafana Workspace ID
      Tags:
        Environment: !Ref EnvironmentName

  GrafanaWorkspaceEndpointParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/grafana/workspace-endpoint/${EnvironmentName}"
      Type: String
      Value: !GetAtt GrafanaWorkspace.Endpoint
      Description: Grafana Workspace Endpoint
      Tags:
        Environment: !Ref EnvironmentName

Outputs:
  GrafanaWorkspaceId:
    Description: ID of Grafana Workspace
    Value: !Ref GrafanaWorkspace
    Export:
      Name: !Sub "${AWS::StackName}-GrafanaWorkspaceId"

  GrafanaWorkspaceArn:
    Description: ARN of Grafana Workspace
    Value: !Sub "arn:${AWS::Partition}:grafana:${AWS::Region}:${AWS::AccountId}:workspace/${GrafanaWorkspace}"
    Export:
      Name: !Sub "${AWS::StackName}-GrafanaWorkspaceArn"

  GrafanaWorkspaceURL:
    Description: Grafana Workspace URL
    Value: !GetAtt GrafanaWorkspace.Endpoint
    Export:
      Name: !Sub "${AWS::StackName}-GrafanaWorkspaceURL"

  PluginInstallationLambdaArn:
    Description: ARN of Plugin Installation Lambda
    Value: !GetAtt PluginInstallationLambda.Arn
    Export:
      Name: !Sub "${AWS::StackName}-PluginInstallationLambdaArn"

  GrafanaAdminPasswordSecretArn:
    Description: ARN of Grafana Admin Password Secret
    Value: !Ref GrafanaAdminPasswordSecret
    Export:
      Name: !Sub "${AWS::StackName}-GrafanaAdminPasswordSecretArn"

  GrafanaAPIKeySecretArn:
    Description: ARN of Grafana API Key Secret
    Value: !Ref GrafanaAPIKeySecret
    Export:
      Name: !Sub "${AWS::StackName}-GrafanaAPIKeySecretArn"
