name: Deploy Grafana Initialization

on:
  push:
    branches:
      - main
    paths:
      - "templates/**"
      - "parameters/**"
      - "dashboards/**"
      - "alerts/**"
      - "scripts/**"
      - ".github/workflows/deploy.yml"
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  STACK_NAME: grafana-observability

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install validation tools
        run: pip install cfn-lint

      - name: Validate files
        run: |
          cfn-lint -i W3002 -- templates/*.yaml
          python -m py_compile scripts/*.py
          for file in parameters/*.json alerts/*.json dashboards/*.json; do
            jq empty "$file"
          done

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Package CloudFormation
        run: |
          aws cloudformation package \
            --template-file templates/01-main-stack.yaml \
            --s3-bucket "${{ secrets.CFN_ARTIFACT_BUCKET }}" \
            --output-template-file packaged-template.yaml \
            --region "${{ env.AWS_REGION }}"

      - name: Deploy infrastructure
        env:
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        run: |
          PARAMETER_OVERRIDES=$(jq -r '.[] | "\(.ParameterKey)=\(.ParameterValue)"' parameters/dev-parameters.json)
          aws cloudformation deploy \
            --template-file packaged-template.yaml \
            --stack-name "${{ env.STACK_NAME }}" \
            --parameter-overrides $PARAMETER_OVERRIDES GrafanaAdminPassword="$GRAFANA_ADMIN_PASSWORD" \
            --capabilities CAPABILITY_NAMED_IAM \
            --region "${{ env.AWS_REGION }}" \
            --no-fail-on-empty-changeset

      - name: Read stack outputs
        id: stack-outputs
        run: |
          OUTPUTS=$(aws cloudformation describe-stacks \
            --stack-name "${{ env.STACK_NAME }}" \
            --query 'Stacks[0].Outputs' \
            --output json \
            --region "${{ env.AWS_REGION }}")
          echo "$OUTPUTS" | jq -r '.[] | "\(.OutputKey)=\(.OutputValue)"' >> "$GITHUB_OUTPUT"

      - name: Deploy Grafana dashboards
        env:
          GRAFANA_URL: ${{ steps.stack-outputs.outputs.GrafanaWorkspaceURL }}
          GRAFANA_API_KEY: ${{ secrets.GRAFANA_API_KEY }}
        run: |
          python scripts/deploy-dashboards.py \
            --grafana-url "$GRAFANA_URL" \
            --api-key "$GRAFANA_API_KEY" \
            --dashboards-dir dashboards/

      - name: Deploy Grafana alerts
        env:
          GRAFANA_URL: ${{ steps.stack-outputs.outputs.GrafanaWorkspaceURL }}
          GRAFANA_API_KEY: ${{ secrets.GRAFANA_API_KEY }}
          SNS_TOPIC_ARN: ${{ steps.stack-outputs.outputs.GrafanaAlertsTopicArn }}
        run: |
          python scripts/setup-alerts.py \
            --grafana-url "$GRAFANA_URL" \
            --api-key "$GRAFANA_API_KEY" \
            --alerts-dir alerts/ \
            --sns-topic-arn "$SNS_TOPIC_ARN" \
            --region "${{ env.AWS_REGION }}" \
            --environment dev
